<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640" role="img" aria-labelledby="title desc">
  <title id="title">CKCsec Wiki bilingual documentation workspace</title>
  <desc id="desc">A clean documentation panel and a terminal panel showing Chinese and English documentation support.</desc>
  <defs>
    <linearGradient id="page" x1="120" y1="80" x2="850" y2="570" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8fbff"/>
      <stop offset="0.55" stop-color="#eef9ff"/>
      <stop offset="1" stop-color="#ecfdf5"/>
    </linearGradient>
    <linearGradient id="accent" x1="150" y1="140" x2="770" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="terminal" x1="545" y1="160" x2="810" y2="455" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#dbeafe" stroke-width="1" opacity="0.6"/>
    </pattern>
  </defs>

  <rect width="960" height="640" rx="48" fill="#f8fafc"/>
  <rect width="960" height="640" rx="48" fill="url(#grid)" opacity="0.55"/>
  <path d="M91 500C169 416 169 233 277 179C383 126 453 215 546 150C639 85 749 75 842 153C934 231 899 405 827 492C756 580 606 576 465 548C324 520 182 598 91 500Z" fill="url(#accent)" opacity="0.12"/>

  <g filter="url(#shadow)">
    <rect x="116" y="90" width="728" height="460" rx="28" fill="url(#page)" stroke="#d8e6f3" stroke-width="1.5"/>
    <rect x="116" y="90" width="728" height="58" rx="28" fill="#ffffff"/>
    <path d="M116 124C116 105.222 131.222 90 150 90H810C828.778 90 844 105.222 844 124V148H116V124Z" fill="#ffffff"/>
    <circle cx="156" cy="119" r="8" fill="#ef4444"/>
    <circle cx="181" cy="119" r="8" fill="#f59e0b"/>
    <circle cx="206" cy="119" r="8" fill="#22c55e"/>
    <text x="244" y="125" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="17">docs / README / i18n</text>

    <g transform="translate(158 190)">
      <rect x="0" y="0" width="322" height="274" rx="22" fill="#ffffff" stroke="#e2e8f0"/>
      <text x="30" y="48" fill="#0284c7" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">CKCsec Wiki</text>
      <text x="30" y="96" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="43" font-weight="800">CN &lt;-&gt; EN</text>
      <rect x="30" y="126" width="214" height="12" rx="6" fill="#0ea5e9"/>
      <rect x="30" y="152" width="162" height="12" rx="6" fill="#14b8a6"/>
      <rect x="30" y="196" width="110" height="42" rx="12" fill="#e0f2fe"/>
      <text x="58" y="223" fill="#0369a1" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">README</text>
      <rect x="154" y="196" width="92" height="42" rx="12" fill="#ccfbf1"/>
      <text x="183" y="223" fill="#0f766e" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">docs</text>
      <rect x="258" y="196" width="34" height="42" rx="12" fill="#f1f5f9"/>
      <path d="M270 212H281M270 223H286" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>
    </g>

    <g transform="translate(518 176)">
      <rect x="0" y="0" width="276" height="304" rx="24" fill="url(#terminal)"/>
      <rect x="0" y="0" width="276" height="48" rx="24" fill="#1f2937"/>
      <path d="M0 24C0 10.745 10.745 0 24 0H252C265.255 0 276 10.745 276 24V48H0V24Z" fill="#1f2937"/>
      <circle cx="28" cy="24" r="6" fill="#ef4444"/>
      <circle cx="48" cy="24" r="6" fill="#f59e0b"/>
      <circle cx="68" cy="24" r="6" fill="#22c55e"/>
      <text x="96" y="30" fill="#cbd5e1" font-family="Menlo, Consolas, monospace" font-size="14">ckcsec</text>
      <text x="28" y="88" fill="#67e8f9" font-family="Menlo, Consolas, monospace" font-size="20">$ locale</text>
      <text x="28" y="126" fill="#e2e8f0" font-family="Menlo, Consolas, monospace" font-size="20">zh-CN</text>
      <text x="28" y="164" fill="#e2e8f0" font-family="Menlo, Consolas, monospace" font-size="20">en-US</text>
      <text x="28" y="202" fill="#86efac" font-family="Menlo, Consolas, monospace" font-size="20">build ok</text>
      <rect x="28" y="230" width="174" height="12" rx="6" fill="#334155"/>
      <rect x="28" y="254" width="124" height="12" rx="6" fill="#334155"/>
    </g>

    <g transform="translate(255 486)">
      <rect x="0" y="0" width="450" height="38" rx="19" fill="#ffffff" stroke="#dbeafe"/>
      <text x="26" y="25" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="15">Security knowledge without language walls</text>
      <circle cx="408" cy="19" r="8" fill="#0ea5e9"/>
      <circle cx="430" cy="19" r="8" fill="#14b8a6"/>
    </g>
  </g>
</svg>
